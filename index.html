<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>3D Model Viewer</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 0 20px;
    }
    h1 {
      margin-top: 30px;
      font-size: 1.8rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #c8a4f8;
    }
    .section-title {
      margin-top: 40px;
      margin-bottom: 12px;
      font-size: 1rem;
      color: #c8a4f8;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    model-viewer {
      width: 90vw;
      height: 60vh;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(200, 164, 248, 0.2);
    }
    .sketchfab-embed-wrapper iframe {
      width: 90vw;
      height: 60vh;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(200, 164, 248, 0.2);
    }
    .sketchfab-embed-wrapper p {
      text-align: center;
      margin-top: 8px;
    }
    .buttons {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #2a1a4a;
      color: #c8a4f8;
      border: 1px solid #c8a4f8;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #c8a4f8; color: #0f0f1a; }
    footer {
      margin-top: 40px;
      margin-bottom: 20px;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <h1>3D Model Viewer</h1>

  <p class="section-title">Sketchfab</p>
  <div class="sketchfab-embed-wrapper">
    <iframe title="Cac-1777303338030" frameborder="0" allowfullscreen mozallowfullscreen="true" webkitallowfullscreen="true" allow="autoplay; fullscreen; xr-spatial-tracking" xr-spatial-tracking execution-while-out-of-viewport execution-while-not-rendered web-share src="https://sketchfab.com/models/6ac67cf9a86a43ff96b3f6c1074482c2/embed"></iframe>
    <p style="font-size: 13px; font-weight: normal; margin: 5px; color: #888;">
      <a href="https://sketchfab.com/3d-models/cac-1777303338030-6ac67cf9a86a43ff96b3f6c1074482c2" target="_blank" rel="nofollow" style="font-weight: bold; color: #1CAAD9;">Cac-1777303338030</a> by <a href="https://sketchfab.com/ycc315" target="_blank" rel="nofollow" style="font-weight: bold; color: #1CAAD9;">ycc315</a> on Sketchfab
    </p>
  </div>

  <p class="section-title">Model Viewer</p>
  <model-viewer
    id="viewer"
    src="cac-1777303338030.glb"
    auto-rotate
    camera-controls
    autoplay>
  </model-viewer>
  <div class="buttons">
    <button onclick="playAnim('mixamo.com')">Idle</button>
    <button onclick="playAnim('Untitled@Flair')">Flair</button>
    <button onclick="playAnim('Untitled@SwingDancing')">Swing Dance</button>
    <button onclick="playAnim('Untitled@Boxing')">Boxing</button>
    <button onclick="playAnim('Untitled@Thankful')">Thankful</button>
    <button onclick="playAnim('Untitled@Sitting')">Sitting</button>
  </div>
  <p class="section-title">Babylon Viewer</p>
  <div id="babylon-container" style="width:90vw;height:60vh;border-radius:16px;overflow:hidden;box-shadow:0 0 40px rgba(200,164,248,0.2);">
    <babylon model="cac-1777303338030.glb"></babylon>
  </div>
  <script src="https://cdn.babylonjs.com/viewer/babylon.viewer.js"></script>

  <footer>Made by 113453004 教院學士班 鄭宇筑</footer>
  <script>
    function playAnim(name) {
      const viewer = document.getElementById('viewer');
      viewer.animationName = name;
      viewer.play();
    }
  </script>
</body>
</html>
